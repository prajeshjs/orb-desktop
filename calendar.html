<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Calendar</title>
  <link rel="stylesheet" href="theme.css">
  <script>
    (async () => {
      try {
        const t = await window.settingsAPI.getTheme();
        document.documentElement.setAttribute('data-theme', t || 'dark');
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      window.settingsAPI?.onThemeChanged?.((theme) => {
        document.documentElement.setAttribute('data-theme', theme);
      });
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      animation: fadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-nav {
      background: var(--btn-secondary-bg);
      border: 1.5px solid var(--btn-secondary-border);
      color: var(--btn-secondary-text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-nav:hover {
      background: var(--btn-secondary-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .btn-nav:active {
      animation: buttonPress 0.15s ease;
    }

    h1#current-period-label {
      font-size: 18px;
      font-weight: 700;
      margin: 0 12px;
      min-width: 160px;
      text-align: center;
      color: var(--text);
    }

    .view-toggles {
      display: flex;
      background: var(--bg);
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .btn-view {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .btn-view.active {
      background: var(--bg-elevated);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }

    .btn-view:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      gap: 20px;
    }

    /* ── Calendar Grid ── */
    #calendar-container {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .grid-year {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .grid-month {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .grid-month-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 6px;
      text-align: center;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ── Cells ── */
    .cal-cell {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .cal-cell:hover {
      background: var(--bg-hover);
      transform: translateY(-2px);
      border-color: var(--border-hover);
      box-shadow: var(--shadow-sm);
    }

    .cal-cell.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .cal-cell.empty {
      opacity: 0.2;
      pointer-events: none;
    }

    .cal-cell.today {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .cell-label {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .task-badge {
      background: var(--accent);
      color: var(--text-inverse);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .task-badge.none {
      background: transparent;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Task List Area ── */
    #task-list-section {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      flex: 1;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    #task-list-header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
    }

    .task-list {
      list-style: none;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .task-item:hover {
      background: var(--bg-hover);
      border-color: var(--border-hover);
    }

    .task-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .task-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .task-actions {
      display: flex;
      gap: 6px;
    }

    .btn-action {
      background: var(--btn-secondary-bg);
      border: 1.5px solid var(--btn-secondary-border);
      color: var(--btn-secondary-text);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-action:hover {
      transform: translateY(-1px);
    }

    .btn-action:active {
      animation: buttonPress 0.15s ease;
    }

    .btn-action.edit:hover {
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      border-color: var(--btn-primary-bg);
    }

    .btn-action.delete:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .prio-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .prio-1 { background: var(--prio-red); box-shadow: 0 0 4px rgba(229,57,53,0.4); }
    .prio-2 { background: var(--prio-blue); box-shadow: 0 0 4px rgba(30,136,229,0.4); }
    .prio-3 { background: var(--prio-yellow); box-shadow: 0 0 4px rgba(249,168,37,0.4); }
    .prio-4 { background: var(--prio-gray); box-shadow: 0 0 4px rgba(120,144,156,0.4); }

    .no-tasks {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 0;
      font-style: italic;
      font-size: 13px;
    }
  </style>
</head>
<body>
<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a85" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
</svg>

<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a85" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
</svg>


  <header>
    <div class="nav-controls">
      <button class="btn-nav" id="btn-prev">&larr; Prev</button>
      <button class="btn-nav" id="btn-today">Today</button>
      <button class="btn-nav" id="btn-next">Next &rarr;</button>
    </div>
    <h1 id="current-period-label">2026</h1>
    <div class="view-toggles">
      <button class="btn-view" data-view="day">Day</button>
      <button class="btn-view" data-view="week">Week</button>
      <button class="btn-view active" data-view="month">Month</button>
      <button class="btn-view" data-view="year">Year</button>
    </div>
  </header>

  <main>
    <div id="calendar-container"></div>
    <div id="task-list-section">
      <div id="task-list-header">Tasks for Selected Period</div>
      <ul class="task-list" id="task-list"></ul>
    </div>
  </main>

  <script>
    let currentView = 'month';
    let referenceDate = new Date();
    let selectedDate = new Date();
    let allTasks = [];

    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const calendarContainer = document.getElementById('calendar-container');
    const periodLabel = document.getElementById('current-period-label');
    const taskList = document.getElementById('task-list');
    const taskListHeader = document.getElementById('task-list-header');

    async function fetchTasks() {
      if (window.calendarAPI) {
        try {
          allTasks = await window.calendarAPI.getFutureTasks();
          render();
        } catch (e) {
          console.error("Failed to load tasks", e);
        }
      } else {
        allTasks = [];
        render();
      }
    }

    function render() {
      updatePeriodLabel();
      renderCalendar();
      renderTaskList();
    }

    function updatePeriodLabel() {
      const year = referenceDate.getFullYear();
      const month = referenceDate.getMonth();
      const date = referenceDate.getDate();

      if (currentView === 'year') {
        periodLabel.textContent = year;
      } else if (currentView === 'month') {
        periodLabel.textContent = `${monthNames[month]} ${year}`;
      } else if (currentView === 'week') {
        const startOfWeek = new Date(referenceDate);
        startOfWeek.setDate(date - startOfWeek.getDay());
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        periodLabel.textContent = `${monthNames[startOfWeek.getMonth()]} ${startOfWeek.getDate()} - ${monthNames[endOfWeek.getMonth()]} ${endOfWeek.getDate()}, ${year}`;
      } else if (currentView === 'day') {
        periodLabel.textContent = `${monthNames[month]} ${date}, ${year}`;
      }
    }

    function renderCalendar() {
      calendarContainer.innerHTML = '';
      const year = referenceDate.getFullYear();
      const month = referenceDate.getMonth();
      const today = new Date();

      if (currentView === 'year') {
        const grid = document.createElement('div');
        grid.className = 'grid-year';
        for (let i = 0; i < 12; i++) {
          const tasksInMonth = allTasks.filter(t => {
            const d = new Date(t.dueAt);
            return d.getFullYear() === year && d.getMonth() === i;
          });
          const cell = document.createElement('div');
          cell.className = 'cal-cell';
          if (year === today.getFullYear() && i === today.getMonth()) cell.classList.add('today');
          if (selectedDate.getFullYear() === year && selectedDate.getMonth() === i) cell.classList.add('selected');
          cell.innerHTML = `
            <div class="cell-label">${monthNames[i]}</div>
            <div class="task-badge ${tasksInMonth.length ? '' : 'none'}">${tasksInMonth.length} tasks</div>
          `;
          cell.onclick = () => {
            selectedDate = new Date(year, i, 1);
            currentView = 'month';
            referenceDate = new Date(selectedDate);
            updateViewToggles();
            render();
          };
          grid.appendChild(cell);
        }
        calendarContainer.appendChild(grid);

      } else if (currentView === 'month') {
        const headerGrid = document.createElement('div');
        headerGrid.className = 'grid-month-header';
        dayNames.forEach(d => {
          const div = document.createElement('div');
          div.textContent = d;
          headerGrid.appendChild(div);
        });
        calendarContainer.appendChild(headerGrid);

        const grid = document.createElement('div');
        grid.className = 'grid-month';
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
          const cell = document.createElement('div');
          cell.className = 'cal-cell empty';
          grid.appendChild(cell);
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const tasksInDay = allTasks.filter(t => {
            const d = new Date(t.dueAt);
            return d.getFullYear() === year && d.getMonth() === month && d.getDate() === i;
          });
          const cell = document.createElement('div');
          cell.className = 'cal-cell';
          cell.style.minHeight = '56px';
          if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
            cell.classList.add('today');
          }
          if (selectedDate.getFullYear() === year && selectedDate.getMonth() === month && selectedDate.getDate() === i) {
            cell.classList.add('selected');
          }
          cell.innerHTML = `
            <div class="cell-label" style="font-size:13px; margin-bottom:4px;">${i}</div>
            <div class="task-badge ${tasksInDay.length ? '' : 'none'}">${tasksInDay.length ? tasksInDay.length : ''}</div>
          `;
          cell.onclick = () => {
            selectedDate = new Date(year, month, i);
            renderCalendar();
            renderTaskList();
          };
          grid.appendChild(cell);
        }
        calendarContainer.appendChild(grid);

      } else if (currentView === 'week') {
        const grid = document.createElement('div');
        grid.className = 'grid-month';
        const startOfWeek = new Date(referenceDate);
        startOfWeek.setDate(referenceDate.getDate() - referenceDate.getDay());

        for (let i = 0; i < 7; i++) {
          const cur = new Date(startOfWeek);
          cur.setDate(startOfWeek.getDate() + i);
          const tasksInDay = allTasks.filter(t => {
            const d = new Date(t.dueAt);
            return d.getFullYear() === cur.getFullYear() && d.getMonth() === cur.getMonth() && d.getDate() === cur.getDate();
          });
          const cell = document.createElement('div');
          cell.className = 'cal-cell';
          if (cur.toDateString() === today.toDateString()) cell.classList.add('today');
          if (cur.toDateString() === selectedDate.toDateString()) cell.classList.add('selected');
          cell.innerHTML = `
            <div class="cell-label" style="font-size:11px; color:var(--text-muted);">${dayNames[i]}</div>
            <div class="cell-label">${cur.getDate()} ${monthNames[cur.getMonth()]}</div>
            <div class="task-badge ${tasksInDay.length ? '' : 'none'}">${tasksInDay.length} tasks</div>
          `;
          cell.onclick = () => {
            selectedDate = new Date(cur);
            renderCalendar();
            renderTaskList();
          };
          grid.appendChild(cell);
        }
        calendarContainer.appendChild(grid);

      } else if (currentView === 'day') {
        calendarContainer.innerHTML = `
          <div style="text-align:center; padding: 20px;">
            <h2 style="color:var(--accent); font-size:28px; font-weight:700;">${dayNames[referenceDate.getDay()]}, ${referenceDate.getDate()} ${monthNames[referenceDate.getMonth()]}</h2>
            <p style="color:var(--text-muted); margin-top:6px;">${referenceDate.getFullYear()}</p>
          </div>
        `;
        selectedDate = new Date(referenceDate);
      }
    }

    function formatTime12(timeStr) {
      if (!timeStr) return '';
      const [hStr, mStr] = timeStr.split(':');
      let h = parseInt(hStr, 10);
      const ampm = h >= 12 ? 'PM' : 'AM';
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;
      return `${h}:${mStr} ${ampm}`;
    }

    function renderTaskList() {
      taskList.innerHTML = '';
      let filteredTasks = [];

      if (currentView === 'year') {
        taskListHeader.textContent = `Tasks for ${monthNames[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;
        filteredTasks = allTasks.filter(t => {
          const d = new Date(t.dueAt);
          return d.getFullYear() === selectedDate.getFullYear() && d.getMonth() === selectedDate.getMonth();
        });
      } else {
        taskListHeader.textContent = `Tasks for ${selectedDate.getDate()} ${monthNames[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;
        filteredTasks = allTasks.filter(t => {
          const d = new Date(t.dueAt);
          return d.getFullYear() === selectedDate.getFullYear() && d.getMonth() === selectedDate.getMonth() && d.getDate() === selectedDate.getDate();
        });
      }

      if (filteredTasks.length === 0) {
        taskList.innerHTML = `<div class="no-tasks">No tasks scheduled for this period.</div>`;
        return;
      }

      filteredTasks.sort((a,b) => new Date(a.dueAt) - new Date(b.dueAt));

      filteredTasks.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item';
        li.innerHTML = `
          <div class="task-info">
            <div class="task-title">
              <span class="prio-dot prio-${t.quadrant}"></span>
              ${t.task}
            </div>
            <div class="task-meta">
              <span>Time: ${formatTime12(t.time) || 'N/A'}</span>
              <span>Priority: ${t.quadrant === 1 ? 'RED' : t.quadrant === 2 ? 'BLUE' : t.quadrant === 3 ? 'YELLOW' : 'GRAY'}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-action edit" onclick="editTask(${t.id})">Edit</button>
            <button class="btn-action delete" onclick="deleteTask(${t.id})">Delete</button>
          </div>
        `;
        taskList.appendChild(li);
      });
    }

    async function editTask(id) {
      if (window.taskAPI && window.taskAPI.editTask) {
        const task = allTasks.find(t => t.id === id);
        if (task) await window.taskAPI.editTask(task);
      }
    }

    async function deleteTask(id) {
      if (confirm('Delete this task?')) {
        if (window.taskAPI && window.taskAPI.deleteTask) {
          await window.taskAPI.deleteTask(id);
          fetchTasks();
        }
      }
    }

    document.getElementById('btn-prev').onclick = () => {
      if (currentView === 'year') referenceDate.setFullYear(referenceDate.getFullYear() - 1);
      else if (currentView === 'month') referenceDate.setMonth(referenceDate.getMonth() - 1);
      else if (currentView === 'week') referenceDate.setDate(referenceDate.getDate() - 7);
      else if (currentView === 'day') referenceDate.setDate(referenceDate.getDate() - 1);
      render();
    };

    document.getElementById('btn-next').onclick = () => {
      if (currentView === 'year') referenceDate.setFullYear(referenceDate.getFullYear() + 1);
      else if (currentView === 'month') referenceDate.setMonth(referenceDate.getMonth() + 1);
      else if (currentView === 'week') referenceDate.setDate(referenceDate.getDate() + 7);
      else if (currentView === 'day') referenceDate.setDate(referenceDate.getDate() + 1);
      render();
    };

    document.getElementById('btn-today').onclick = () => {
      referenceDate = new Date();
      selectedDate = new Date();
      render();
    };

    function updateViewToggles() {
      document.querySelectorAll('.btn-view').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === currentView);
      });
    }

    document.querySelectorAll('.btn-view').forEach(btn => {
      btn.onclick = () => {
        currentView = btn.dataset.view;
        updateViewToggles();
        render();
      };
    });

    fetchTasks();
    setInterval(fetchTasks, 5000);
  </script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) {
      window.lucide.createIcons();
    }
  });
</script>
</body>
</html>
